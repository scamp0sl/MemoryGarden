[pytest]
# ============================================
# Pytest Configuration
# ============================================

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test markers
markers =
    asyncio: mark test as async
    integration: mark test as integration test (requires real API keys)
    slow: mark test as slow running

# Asyncio mode
# auto: 자동으로 asyncio 테스트 감지
# strict: @pytest.mark.asyncio 명시적으로 필요
asyncio_mode = auto

# Asyncio default fixture loop scope
# function: 각 테스트마다 새 이벤트 루프 (권장)
# session: 전체 세션에서 하나의 루프 (Redis 연결 문제 발생 가능)
asyncio_default_fixture_loop_scope = function

# Test output
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Coverage (optional)
# --cov=.
# --cov-report=term-missing
# --cov-report=html

# Test paths
testpaths = tests

# Ignore paths
norecursedirs = .git .tox dist build *.egg venv
